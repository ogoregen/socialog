<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>socialog</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%231a1a18'/><path d='M336 148C336 148 294 108 236 116C178 124 152 158 168 194C182 226 220 232 256 240C292 248 336 258 344 296C354 338 322 378 270 390C218 402 168 382 152 364' stroke='%23f5f0e8' stroke-width='42' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="socialog" />
  <meta name="theme-color" content="#1e1c16" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f9f8f5; --bg:        oklch(0.980 0.006 80);
      --surface:   #f5f4f1; --surface:   oklch(0.970 0.005 80);
      --border:    #e8e7e3; --border:    oklch(0.92  0.004 80);
      --fg:        #1e1c16; --fg:        oklch(0.13  0.010 80);
      --fg-muted:  #7a7870; --fg-muted:  oklch(0.55  0.006 80);
      --accent:    #1e1c16; --accent:    oklch(0.13  0.010 80);
      --font:      'Geist', 'Helvetica Neue', sans-serif;
      --mono:      'Geist Mono', monospace;
    }

    [data-theme="dark"] {
      --bg:        #181714; --bg:        oklch(0.10  0.008 80);
      --surface:   #201e1a; --surface:   oklch(0.13  0.008 80);
      --border:    #332f2a; --border:    oklch(0.20  0.008 80);
      --fg:        #f0efeb; --fg:        oklch(0.95  0.006 80);
      --fg-muted:  #7a7870; --fg-muted:  oklch(0.52  0.006 80);
      --accent:    #f0efeb; --accent:    oklch(0.95  0.006 80);
    }

    html, body, #root {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    ::selection { background: var(--fg); color: var(--bg); }

    input, textarea, button {
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    button:active { opacity: 0.7; }

    [data-tap] { cursor: pointer; transition: transform 0.1s; }
    [data-tap]:active { transform: scale(0.985); }

    /* Native-app feel: no text selection on UI chrome */
    body { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    /* Prevent "Save Image" sheet on long-press of images */
    img { -webkit-touch-callout: none; }

    /* iOS zoom prevention: inputs must be ≥ 16px */
    input, textarea { font-size: 16px; }

  </style>
</head>
<body>
  <div id="root"></div>

  <script src="utils.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="text/babel" src="toast.jsx"></script>
  <script type="text/babel" src="bottom-sheet.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Bookmarks.jsx"></script>
  <script type="text/babel" src="Todos.jsx"></script>
  <script type="text/babel" src="Routines.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="Profile.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>

  <script type="text/babel">
    // ── Tweaks defaults ───────────────────────────────────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "accentHue": 80,
      "fontScale": 0.95,
      "bookmarkLayout": "list"
    }/*EDITMODE-END*/;

    // ── Tab config ────────────────────────────────────────────────────────────
    const TABS = [
      { id: 'home',      label: 'Home',      icon: '◈' },
      { id: 'routines',  label: 'Routines',  icon: '○' },
      { id: 'todos',     label: 'Tasks',     icon: '✓' },
      { id: 'bookmarks', label: 'Archive',   icon: '▣' },
    ];

    // ── App shell ─────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = React.useState(
        () => localStorage.getItem('socialog_tab') || 'home'
      );
      const tabRefs    = React.useRef({});
      const touchRef   = React.useRef(null);
      const [tweaks, setTweaksState] = React.useState(() => ({
        ...TWEAK_DEFAULTS,
        theme: localStorage.getItem('socialog_theme') || TWEAK_DEFAULTS.theme,
      }));
      const [tweaksOpen, setTweaksOpen]     = React.useState(false);
      const [profileOpen, setProfileOpen]   = React.useState(false);
      const [settingsOpen, setSettingsOpen] = React.useState(false);

      // ── Drawer (left nav panel) ──────────────────────────────────────────────
      const drawerRef   = React.useRef(null);
      const drawerBdRef = React.useRef(null);
      const drawerOpen  = React.useRef(false);
      const edgeDrag    = React.useRef(null);
      const drawerDrag  = React.useRef(null);
      const DRAWER_W    = 0.78; // fraction of screen width

      function openDrawer() {
        drawerOpen.current = true;
        const d = drawerRef.current, b = drawerBdRef.current;
        if (d) { d.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)'; d.style.transform = 'translateX(0)'; }
        if (b) { b.style.transition = 'opacity 0.3s ease'; b.style.opacity = '1'; b.style.pointerEvents = 'auto'; }
      }
      function closeDrawer() {
        drawerOpen.current = false;
        const d = drawerRef.current, b = drawerBdRef.current;
        if (d) { d.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)'; d.style.transform = 'translateX(-100%)'; }
        if (b) { b.style.transition = 'opacity 0.3s ease'; b.style.opacity = '0';
          setTimeout(() => { if (b) b.style.pointerEvents = 'none'; }, 300); }
      }

      // Edge zone: swipe-right from left edge to open drawer
      function handleEdgeStart(e) {
        if (drawerOpen.current) return;
        edgeDrag.current = { startX: e.touches[0].clientX };
        const d = drawerRef.current, b = drawerBdRef.current;
        if (d) d.style.transition = 'none';
        if (b) { b.style.transition = 'none'; b.style.pointerEvents = 'auto'; }
      }
      function handleEdgeMove(e) {
        if (!edgeDrag.current) return;
        const dx = Math.max(0, e.touches[0].clientX - edgeDrag.current.startX);
        const pct = Math.min(dx / (window.innerWidth * DRAWER_W), 1);
        const d = drawerRef.current, b = drawerBdRef.current;
        if (d) d.style.transform = `translateX(${(pct - 1) * 100}%)`;
        if (b) b.style.opacity = String(pct);
      }
      function handleEdgeEnd(e) {
        if (!edgeDrag.current) return;
        const dx = e.changedTouches[0].clientX - edgeDrag.current.startX;
        edgeDrag.current = null;
        if (dx > window.innerWidth * DRAWER_W * 0.3) openDrawer(); else closeDrawer();
      }

      // Drawer panel: swipe-left to close
      function handleDrawerMoveStart(e) {
        drawerDrag.current = { startX: e.touches[0].clientX };
        const d = drawerRef.current, b = drawerBdRef.current;
        if (d) d.style.transition = 'none';
        if (b) b.style.transition = 'none';
      }
      function handleDrawerMove(e) {
        if (!drawerDrag.current) return;
        const dx = Math.min(0, e.touches[0].clientX - drawerDrag.current.startX);
        const pct = Math.max(dx / (window.innerWidth * DRAWER_W), -1);
        const d = drawerRef.current, b = drawerBdRef.current;
        if (d) d.style.transform = `translateX(${pct * 100}%)`;
        if (b) b.style.opacity = String(Math.max(0, 1 + pct));
      }
      function handleDrawerEnd(e) {
        if (!drawerDrag.current) return;
        const dx = e.changedTouches[0].clientX - drawerDrag.current.startX;
        drawerDrag.current = null;
        if (dx < -(window.innerWidth * DRAWER_W * 0.3)) closeDrawer(); else openDrawer();
      }

      // Persist active tab + reset scroll on the newly active tab
      React.useEffect(() => {
        localStorage.setItem('socialog_tab', tab);
        tabRefs.current[tab]?.scrollTo(0, 0);
      }, [tab]);

      // Apply theme
      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', tweaks.theme);
      }, [tweaks.theme]);

      // Tweaks panel protocol
      React.useEffect(() => {
        function handleMsg(e) {
          if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        }
        window.addEventListener('message', handleMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handleMsg);
      }, []);

      function handleTouchStart(e) {
        let el = e.target;
        while (el && el !== e.currentTarget) {
          if (el.scrollWidth > el.clientWidth + 2) { touchRef.current = null; return; }
          el = el.parentElement;
        }
        touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY,
          direction: null, dragging: false, lastDx: 0, time: Date.now() };
      }
      function handleTouchMove(e) {
        if (!touchRef.current) return;
        const dx = e.touches[0].clientX - touchRef.current.x;
        const dy = e.touches[0].clientY - touchRef.current.y;
        if (!touchRef.current.direction) {
          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
          if (Math.abs(dy) > Math.abs(dx)) { touchRef.current = null; return; }
          touchRef.current.direction = 'h';
        }
        touchRef.current.dragging = true;
        const cur = TABS.findIndex(t => t.id === tab);
        // Hard-clamp at edges: first/last tab never slides into empty space at all.
        const atStart = cur === 0 && dx > 0;
        const atEnd   = cur === TABS.length - 1 && dx < 0;
        const clampedDx = (atStart || atEnd) ? 0 : dx;
        touchRef.current.lastDx = clampedDx;
        TABS.forEach(({ id }, idx) => {
          const el = tabRefs.current[id];
          if (!el) return;
          el.style.transition = 'none';
          el.style.transform  = `translateX(calc(${(idx - cur) * 100}% + ${clampedDx}px))`;
        });
      }
      function handleTouchEnd(e) {
        if (!touchRef.current || !touchRef.current.dragging) { touchRef.current = null; return; }
        const { lastDx, time } = touchRef.current;
        touchRef.current = null;
        const velocity  = Math.abs(lastDx) / (Date.now() - time);
        const ids = TABS.map(t => t.id);
        const cur = ids.indexOf(tab);
        const next = lastDx < 0 ? ids[cur + 1] : ids[cur - 1];
        if (next && (Math.abs(lastDx) > window.innerWidth * 0.35 || velocity > 0.5)) {
          // Scale duration to remaining distance so a nearly-complete swipe doesn't
          // crawl through a full 450ms for the last 10% of travel.
          const remaining = 1 - Math.min(Math.abs(lastDx) / window.innerWidth, 1);
          const ms = Math.round(Math.max(120, 450 * remaining));
          TABS.forEach(({ id }) => {
            const el = tabRefs.current[id];
            if (el) el.style.transition = `transform ${ms}ms ease`;
          });
          setTab(next);
        } else {
          // ease (not ease-out) starts slowly so the snap-back doesn't feel abrupt.
          // Duration scales with distance; floor at 280ms so short drags aren't instant.
          const dist = Math.abs(lastDx);
          const ms   = Math.max(280, Math.min(500, dist * 2));
          requestAnimationFrame(() => {
            TABS.forEach(({ id }, idx) => {
              const el = tabRefs.current[id];
              if (!el) return;
              el.style.transition = `transform ${ms}ms ease`;
              el.style.transform  = `translateX(${(idx - cur) * 100}%)`;
            });
          });
        }
      }

      function setTweak(key, val) {
        const update = typeof key === 'object' ? key : { [key]: val };
        setTweaksState(prev => {
          const next = { ...prev, ...update };
          if (next.theme) localStorage.setItem('socialog_theme', next.theme);
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
          return next;
        });
      }

      // Page title maps
      const PAGE_TITLES = {
        bookmarks: 'Archive',
        todos:     'Tasks',
        routines:  'Routines',
      };

      // Pending counts
      const todosData     = React.useMemo(() => load('todos') || [],    [tab]);
      const routinesData  = React.useMemo(() => load('routines') || [], [tab]);
      const pendingTodos  = todosData.filter(t => !t.done).length;
      const todayIdx      = currentDayIndex();
      const todayKey      = today();
      const pendingRoutines = routinesData.filter(r =>
        r.days.includes(todayIdx) && !(r.completions && r.completions[todayKey])
      ).length;

      const badges = {
        todos:    pendingTodos,
        routines: pendingRoutines,
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', maxWidth: 480, margin: '0 auto', position: 'relative', background: 'var(--bg)' }}>

          {/* ── Safe area top spacer ── */}
          <div style={{ height: 'env(safe-area-inset-top, 0px)', flexShrink: 0 }} />

          {/* ── Content ── */}
          <div onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
            style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
            {TABS.map(({ id }, idx) => {
              const offset = (idx - TABS.findIndex(t => t.id === tab)) * 100;
              return (
                <div key={id} ref={el => tabRefs.current[id] = el} style={{
                  position: 'absolute', inset: 0,
                  overflowY: 'auto', overflowX: 'hidden',
                  transform: `translateX(${offset}%)`,
                  transition: 'transform 0.45s ease',
                  pointerEvents: id === tab ? 'auto' : 'none',
                }}>
                  {id === 'home'      && <Home onNavigate={setTab} onOpenDrawer={openDrawer} />}
                  {id === 'bookmarks' && <Bookmarks />}
                  {id === 'todos'     && <Todos />}
                  {id === 'routines'  && <Routines />}
                </div>
              );
            })}
          </div>

          {/* ── Bottom tab bar ── */}
          <nav style={{
            display: 'flex', background: 'var(--bg)', flexShrink: 0,
            borderTop: '1px solid var(--border)',
            paddingBottom: 'env(safe-area-inset-bottom, 20px)',
          }}>
            {TABS.map(t => {
              const active = tab === t.id;
              const badge  = badges[t.id] || 0;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
                  justifyContent: 'center', gap: 4,
                  padding: '12px 0 10px', background: 'none', border: 'none',
                  cursor: 'pointer', position: 'relative',
                }}>
                  {/* Icon */}
                  <span style={{
                    fontSize: 20, lineHeight: 1, position: 'relative',
                    color: active ? 'var(--fg)' : 'var(--fg-muted)',
                    transition: 'color 0.15s',
                  }}>
                    {t.icon}
                    {badge > 0 && (
                      <span style={{
                        position: 'absolute', top: -4, right: -8,
                        background: '#ef4444', color: '#fff',
                        fontSize: 9, fontWeight: 700, borderRadius: 10,
                        padding: '1px 4px', lineHeight: 1.4,
                      }}>{badge}</span>
                    )}
                  </span>
                  {/* Label */}
                  <span style={{
                    fontSize: 10, fontWeight: active ? 600 : 400, letterSpacing: '0.04em',
                    color: active ? 'var(--fg)' : 'var(--fg-muted)', transition: 'all 0.15s',
                  }}>
                    {t.label}
                  </span>
                </button>
              );
            })}
          </nav>

          <Toaster />

          {/* ── Left-edge swipe zone (always present, thin strip) ── */}
          <div style={{ position: 'fixed', top: 0, left: 0, width: 20, height: '100%', zIndex: 210 }}
            onTouchStart={handleEdgeStart} onTouchMove={handleEdgeMove} onTouchEnd={handleEdgeEnd} />

          {/* ── Drawer backdrop ── */}
          <div ref={drawerBdRef} onClick={closeDrawer}
            style={{ position: 'fixed', inset: 0, zIndex: 215, background: 'rgba(0,0,0,0.35)', opacity: 0, pointerEvents: 'none' }} />

          {/* ── Drawer panel ── */}
          <div ref={drawerRef}
            onTouchStart={handleDrawerMoveStart} onTouchMove={handleDrawerMove} onTouchEnd={handleDrawerEnd}
            style={{
              position: 'fixed', top: 0, left: 0, bottom: 0, zIndex: 220,
              width: `${DRAWER_W * 100}%`, maxWidth: 320,
              background: 'var(--bg)', transform: 'translateX(-100%)',
              display: 'flex', flexDirection: 'column',
              paddingTop: 'env(safe-area-inset-top, 0px)',
              borderRight: '1px solid var(--border)',
            }}>
            <div style={{ padding: '28px 24px 16px' }}>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" style={{ width: 130, height: 32, marginBottom: 32, display: 'block' }}>
                <rect width="64" height="64" rx="14" fill="#1a1a18"/>
                <path d="M42.5 18.5 C42.5 18.5 37 13.5 29.5 14.5 C22 15.5 19 19.5 21 23.5 C22.8 27 27.5 28 32 29 C36.5 30 42.5 31.5 43.5 37 C44.5 42.5 40.5 47 33.5 48.5 C26.5 50 21 47.5 19 45"
                  stroke="#f5f0e8" strokeWidth="5.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                <text x="80" y="41" fontFamily="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
                  fontSize="28" fontWeight="700" letterSpacing="-0.5" fill="currentColor">socialog</text>
              </svg>
              {[
                { icon: '◉', label: 'Profile',  action: () => setProfileOpen(true) },
                { icon: '⚙', label: 'Settings', action: () => setSettingsOpen(true) },
              ].map(({ icon, label, action }) => (
                <button key={label} onClick={() => { closeDrawer(); setTimeout(action, 320); }} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  width: '100%', background: 'none', border: 'none', cursor: 'pointer',
                  padding: '10px 0', color: 'var(--fg)', textAlign: 'left',
                }}>
                  <span style={{ fontSize: 18, width: 24, textAlign: 'center', color: 'var(--fg-muted)' }}>{icon}</span>
                  <span style={{ fontSize: 15, fontWeight: 500 }}>{label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* ── Profile page ── */}
          {profileOpen && <ProfilePage onBack={() => setProfileOpen(false)} />}

          {/* ── Settings page ── */}
          {settingsOpen && <SettingsPage theme={tweaks.theme} onThemeChange={v => setTweak('theme', v)} onBack={() => setSettingsOpen(false)} />}

          {/* ── Tweaks panel ── */}
          {tweaksOpen && (
            <TweaksPanel onClose={() => {
              setTweaksOpen(false);
              window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
            }}>
              <TweakSection title="Appearance">
                <TweakRadio
                  label="Theme"
                  value={tweaks.theme}
                  options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
                  onChange={v => setTweak('theme', v)}
                />
                <TweakSlider
                  label="Font scale"
                  value={tweaks.fontScale}
                  min={0.85} max={1.2} step={0.05}
                  onChange={v => {
                    setTweak('fontScale', v);
                    document.documentElement.style.fontSize = (v * 16) + 'px';
                  }}
                />
              </TweakSection>
              <TweakSection title="Bookmarks">
                <TweakRadio
                  label="Layout"
                  value={tweaks.bookmarkLayout}
                  options={[{ value: 'grid', label: 'Grid' }, { value: 'list', label: 'List' }]}
                  onChange={v => {
                    setTweak('bookmarkLayout', v);
                    window.__bookmarkLayout = v;
                    window.dispatchEvent(new CustomEvent('bookmarkLayoutChange', { detail: v }));
                  }}
                />
              </TweakSection>
            </TweaksPanel>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
